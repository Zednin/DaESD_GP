<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@700&family=Poppins:wght@400;500;600;700&display=swap');
    </style>
  </head>
  <body style="margin:0; padding:0; background-color:#f5f1f2;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="width:100%; background-color:#f5f1f2; margin:0; padding:28px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:760px; width:100%;">
            {% block content %}{% endblock %}
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
